<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asosiy oyna - Milliy Messenjer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dashboard-body">

    <div class="sidebar">
        <div class="profile-section">
            <h3>{{ ism }}</h3>
            <span class="role-badge">{{ rol }}</span>
        </div>
        <ul class="nav-links">
            <li style="background-color: #f0f2f5;"><a href="/chat" style="text-decoration:none; color:inherit; display:block;">💬 Barcha chatlar</a></li>
            <li><a href="/ustozlar" style="text-decoration:none; color:inherit; display:block;">👨‍🏫 Ustozlar tarmog'i</a></li>
            <li>📝 Guruhlar va Testlar</li>
            <li><a href="/chiqish" style="text-decoration:none; color:red; display:block;">🚪 Chiqish</a></li>
        </ul>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <h2>Guruh chati</h2>
        </div>
        
        <div class="chat-messages">
            <div class="message system-message">Chatga xush kelibsiz!</div>
            
            {% for x in xabarlar %}
                <div class="message {% if x[0] == ism %}user-message{% else %}other-message{% endif %}">
                    <small><b>{{ x[0] }} ({{ x[1] }})</b></small><br>
                    {{ x[2] }}
                    <div style="text-align: right; font-size: 11px; margin-top: 5px; opacity: 0.7;">{{ x[3] }}</div>
                </div>
            {% endfor %}
        </div>
        
        <div class="chat-input-area">
            <input type="text" placeholder="Xabar yozing...">
            <button class="btn send-btn">Yuborish</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <script>
        const xabarKiritish = document.querySelector('.chat-input-area input');
        const yuborishTugmasi = document.querySelector('.send-btn');
        const chatOynasi = document.querySelector('.chat-messages');
        const joriyIsm = "{{ ism }}";
        const joriyRol = "{{ rol }}";

        const socket = io();
        chatOynasi.scrollTop = chatOynasi.scrollHeight;

        function xabarYuborish() {
            const matn = xabarKiritish.value.trim();
            if (matn !== '') {
                // YANGI: Kompyuterdan joriy vaqtni (soat va minut) olamiz
                const hozir = new Date();
                const vaqt = hozir.getHours().toString().padStart(2, '0') + ':' + hozir.getMinutes().toString().padStart(2, '0');

                socket.emit('yangi_xabar', { ism: joriyIsm, rol: joriyRol, matn: matn, vaqt: vaqt });
                xabarKiritish.value = '';
            }
        }

        socket.on('xabar_tarqatish', function(data) {
            const yangiXabar = document.createElement('div');
            
            if (data.ism === joriyIsm) {
                yangiXabar.classList.add('message', 'user-message');
            } else {
                yangiXabar.classList.add('message', 'other-message');
            }
            
            // Xabarning eng pastiga chiroyli qilib vaqtni joylashtiramiz
            yangiXabar.innerHTML = `<small><b>${data.ism} (${data.rol})</b></small><br>${data.matn}
                                    <div style="text-align: right; font-size: 11px; margin-top: 5px; opacity: 0.7;">${data.vaqt}</div>`;
            
            chatOynasi.appendChild(yangiXabar);
            chatOynasi.scrollTop = chatOynasi.scrollHeight;
        });

        yuborishTugmasi.addEventListener('click', xabarYuborish);
        xabarKiritish.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') xabarYuborish();
        });
    </script>
</body>
</html>
